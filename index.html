<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<!-- Regras do git
feat: → nova funcionalidade
fix: → correção de bug
docs: → alteração na documentação
style: → mudanças visuais ou de formatação (sem alterar lógica)
refactor: → reorganização do código sem mudar comportamento
test: → criação ou alteração de testes
chore: → tarefas de manutenção (configurações, dependências, etc.)
perf: → melhoria de desempenho
-->

<body>
    <div class="main">
        <div class="title">
            <h1>Lista de Tarefas</h1>
            <span>Adicione suas tarefas</span>
        </div>
        <div class="add">
            <input id="addTarefa" type="text" placeholder="Digite uma tarefa...">
            <button id="adicionar">Adicionar</button>
        </div>
        <ul class="tarefas">
            <li class="tarefa">
                <div class="conteudo">
                    <input type="checkbox">
                    <span>Estudar</span>
                </div>
                <button type="button">
                    <img src="Svgs/Lixo.svg" alt="Excluir">
                </button>
            </li>
            <li class="tarefa">
                <div class="conteudo">
                    <input type="checkbox">
                    <span>Lavar a louça</span>
                </div>
                <button type="button">
                    <img src="Svgs/Lixo.svg" alt="Excluir">
                </button>
            </li>
            <li class="tarefa">
                <div class="conteudo">
                    <input type="checkbox">
                    <span>Limpar a casa</span>
                </div>
                <button type="button">
                    <img src="Svgs/Lixo.svg" alt="Excluir">
                </button>
            </li>
        </ul>
        <footer>Lista de tarefas feito para treinar Java Script 😁</footer>
    </div>
</body>

</html>
